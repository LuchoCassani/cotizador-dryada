services:

  backend:
    image: ghcr.io/luchocassani/cotizador-dryada-backend:latest
    volumes:
      - /opt/cotizador/data:/app/data
    env_file: backend.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - interna

  frontend:
    image: ghcr.io/luchocassani/cotizador-dryada-frontend:latest
    ports:
      - "80:80"
    env_file: frontend.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - interna

networks:
  interna:
    driver: bridge
