name: Build PrusaSlicer Base Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: PrusaSlicer version
        type: string
        default: '2.8.1'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: $VERSION (expected semver x.y.z)"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.prusaslicer
          push: true
          tags: |
            ghcr.io/luchocassani/dryada-prusaslicer-base:${{ inputs.version }}
            ghcr.io/luchocassani/dryada-prusaslicer-base:latest
