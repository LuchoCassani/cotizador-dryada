name: CI/CD — Cotizador Dryada

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm test --if-present
        working-directory: backend

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: |
          railway up --service frontend \
            --build-arg VITE_API_URL=${{ vars.RAILWAY_BACKEND_URL }} \
            --build-arg VITE_API_TOKEN=${{ secrets.API_TOKEN }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # RAILWAY_FRONTEND_URL se configura en Railway → backend → Variables como FRONTEND_URL
      # para que el CORS del backend acepte el dominio del frontend en producción
