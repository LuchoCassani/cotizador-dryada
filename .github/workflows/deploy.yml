name: CI/CD — Cotizador Dryada

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: frontend

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run tests
        run: npm test --if-present
        working-directory: backend

  # El backend hace FROM de dryada-prusaslicer-base, que es multi-arch (amd64/arm64)
  # y compila better-sqlite3 (módulo nativo) — se buildea en runners nativos de cada
  # arquitectura y se combina en un manifest, igual que la imagen base.
  build-backend:
    name: Build backend (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.arch }}
          tags: |
            ghcr.io/luchocassani/cotizador-dryada-backend:${{ github.sha }}-${{ matrix.arch }}

  manifest-backend:
    name: Combine backend into multi-arch manifest
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/luchocassani/cotizador-dryada-backend:${IMAGE_TAG} \
            -t ghcr.io/luchocassani/cotizador-dryada-backend:latest \
            ghcr.io/luchocassani/cotizador-dryada-backend:${IMAGE_TAG}-amd64 \
            ghcr.io/luchocassani/cotizador-dryada-backend:${IMAGE_TAG}-arm64

  # El frontend no tiene dependencias nativas (nginx + estáticos de Vite), así que
  # cross-compilar con QEMU en un solo runner alcanza sin necesitar un job por arquitectura.
  build-frontend:
    name: Build frontend (multi-arch)
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ghcr.io/luchocassani/cotizador-dryada-frontend:${{ github.sha }}
            ghcr.io/luchocassani/cotizador-dryada-frontend:latest

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [manifest-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Render compose file with commit SHA
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed "s/:latest/:${IMAGE_TAG}/g" docker-compose.prod.yml > /tmp/docker-compose.deploy.yml

      - name: Setup SSH
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_KNOWN_HOSTS: ${{ secrets.ORACLE_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$ORACLE_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$ORACLE_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy compose file to VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/docker-compose.deploy.yml \
            "${ORACLE_USER}@${ORACLE_HOST}:/opt/cotizador/docker-compose.prod.yml"

      - name: Deploy on VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${ORACLE_USER}@${ORACLE_HOST}" \
            'docker compose -f /opt/cotizador/docker-compose.prod.yml pull && docker compose -f /opt/cotizador/docker-compose.prod.yml up -d && docker image prune -f'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
