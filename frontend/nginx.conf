server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-Frame-Options          "DENY"             always;
    add_header Referrer-Policy          "strict-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https: blob:; worker-src 'self' blob:" always;

    client_max_body_size 500m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Proxy de API al backend — el token se inyecta en runtime via envsubst
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer ${API_TOKEN}";
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 500m;
    }

    # Assets con hash (Vite): caché 1 año
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control        "public, immutable";
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-Frame-Options        "DENY"             always;
        add_header Referrer-Policy        "strict-origin"    always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https: blob:; worker-src 'self' blob:" always;
    }

    # index.html: nunca cachear
    location = /index.html {
        add_header Cache-Control        "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-Frame-Options        "DENY"             always;
        add_header Referrer-Policy        "strict-origin"    always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https: blob:; worker-src 'self' blob:" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
