server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — se repiten en los location blocks con add_header propio
    # porque nginx no hereda add_header del bloque padre si el hijo tiene el suyo
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-Frame-Options          "DENY"             always;
    add_header Referrer-Policy          "strict-origin"    always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:" always;

    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Assets con hash (Vite): caché 1 año
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control        "public, immutable";
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-Frame-Options        "DENY"             always;
        add_header Referrer-Policy        "strict-origin"    always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:" always;
    }

    # index.html: nunca cachear
    location = /index.html {
        add_header Cache-Control        "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff"          always;
        add_header X-Frame-Options        "DENY"             always;
        add_header Referrer-Policy        "strict-origin"    always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:" always;
    }

    # SPA fallback — sin add_header propio, hereda los del bloque server
    location / {
        try_files $uri $uri/ /index.html;
    }
}
